name: VimKeys
options:
  createIntermediateGroups: true
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 0.7.7
    CURRENT_PROJECT_VERSION: 19
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
targets:
  VimKeys:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: VimKeys
    dependencies:
      - package: Sparkle
      - target: VimKeysSafariExtension
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.taylorfinklea.vimkeys
        PRODUCT_NAME: VimKeys
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: VimKeys/Info.plist
        CODE_SIGN_STYLE: Automatic
      configs:
        # Release builds sign with the stable Developer ID Application cert
        # so TCC's designated-requirement check passes across rebuilds.
        # Without this, every xcodebuild produces a fresh adhoc cdhash and
        # Input Monitoring / Accessibility grants reset on each install.
        # V-M6 layers notarization on top; the signing identity itself does
        # not change between local dev and the released artifact.
        # CODE_SIGN_ENTITLEMENTS is Release-only because Debug builds
        # don't have provisioning profiles for the App Group, and Xcode
        # refuses to compile entitlement claims without one. The runtime
        # consequence: Debug builds always fall back to the HTML
        # bookmark watcher.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          DEVELOPMENT_TEAM: K7CBQW6MPG
          OTHER_CODE_SIGN_FLAGS: "--timestamp=none"
          CODE_SIGN_ENTITLEMENTS: VimKeys/VimKeys.entitlements
    info:
      path: VimKeys/Info.plist
      properties:
        CFBundleDisplayName: VimKeys
        CFBundleShortVersionString: "0.7.7"
        CFBundleVersion: "19"
        LSApplicationCategoryType: public.app-category.utilities
        LSUIElement: true
        NSAppleEventsUsageDescription: "VimKeys uses Apple Events to read Safari's open tabs and URL, copy the current page link to the clipboard, and open URLs you type in the vomnibar (o / O / T / yy / p / P)."
        # Sparkle auto-update keys. The matching EdDSA private key lives in
        # the release-builder's login keychain (shared with LayerKeys —
        # both apps' updates are signed with the same EdDSA pair). For
        # CI the private key is fed via the SPARKLE_EDDSA_PRIVATE_KEY
        # GitHub secret.
        SUPublicEDKey: "l2ghc9Y6kQcCddTEo6oRIJ2KL3rrE1ji/Xz+i9bme70="
        SUFeedURL: "https://github.com/TaylorFinklea/vimkeys/releases/latest/download/appcast.xml"
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    scheme:
      gatherCoverageData: false
      testTargets:
        - VimKeysTests
  VimKeysSafariExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: VimKeysSafariExtension
        excludes:
          - "VimKeysSafariExtension.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.taylorfinklea.vimkeys.SafariExtension
        PRODUCT_NAME: VimKeysSafariExtension
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: VimKeysSafariExtension/Info.plist
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: YES
      configs:
        # Same Developer ID story as the main app — TCC bindings need to
        # survive rebuilds, and notarization checks the signing identity.
        # Entitlements are Release-only for the same reason as the main
        # app target above.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          DEVELOPMENT_TEAM: K7CBQW6MPG
          OTHER_CODE_SIGN_FLAGS: "--timestamp=none"
          CODE_SIGN_ENTITLEMENTS: VimKeysSafariExtension/VimKeysSafariExtension.entitlements
    info:
      path: VimKeysSafariExtension/Info.plist
      properties:
        CFBundleDisplayName: VimKeys Bookmark Sync
        CFBundleShortVersionString: "0.7.7"
        CFBundleVersion: "19"
        CFBundlePackageType: XPC!
        LSMinimumSystemVersion: "14.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari.web-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SafariWebExtensionHandler
  VimKeysTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: VimKeysTests
    dependencies:
      - target: VimKeys
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    scheme:
      gatherCoverageData: false

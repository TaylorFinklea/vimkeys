name: VimKeys
options:
  createIntermediateGroups: true
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 0.2.2
    CURRENT_PROJECT_VERSION: 4
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
targets:
  VimKeys:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: VimKeys
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.taylorfinklea.vimkeys
        PRODUCT_NAME: VimKeys
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: VimKeys/Info.plist
        CODE_SIGN_STYLE: Automatic
    info:
      path: VimKeys/Info.plist
      properties:
        CFBundleDisplayName: VimKeys
        CFBundleShortVersionString: "0.2.2"
        CFBundleVersion: "4"
        LSApplicationCategoryType: public.app-category.utilities
        LSUIElement: true
        # Sparkle auto-update keys. The matching EdDSA private key is generated
        # by Sparkle's `generate_keys` and stored in the release-builder's macOS
        # keychain. V-M1 ships with an empty SUPublicEDKey and automatic checks
        # disabled; V-M6 generates the real keypair and flips both on.
        SUPublicEDKey: ""
        SUFeedURL: "https://github.com/TaylorFinklea/vimkeys/releases/latest/download/appcast.xml"
        SUEnableAutomaticChecks: false
        SUScheduledCheckInterval: 86400
    scheme:
      gatherCoverageData: false
      testTargets:
        - VimKeysTests
  VimKeysTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: VimKeysTests
    dependencies:
      - target: VimKeys
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    scheme:
      gatherCoverageData: false

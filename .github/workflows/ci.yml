name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: xcodebuild test -scheme VimKeys -project VimKeys.xcodeproj -destination 'platform=macOS'

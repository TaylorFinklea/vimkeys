name: VimKeys
options:
  createIntermediateGroups: true
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 0.4.0
    CURRENT_PROJECT_VERSION: 7
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
targets:
  VimKeys:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: VimKeys
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.taylorfinklea.vimkeys
        PRODUCT_NAME: VimKeys
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: VimKeys/Info.plist
        CODE_SIGN_STYLE: Automatic
      configs:
        # Release builds sign with the stable Developer ID Application cert
        # so TCC's designated-requirement check passes across rebuilds.
        # Without this, every xcodebuild produces a fresh adhoc cdhash and
        # Input Monitoring / Accessibility grants reset on each install.
        # V-M6 layers notarization on top; the signing identity itself does
        # not change between local dev and the released artifact.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          DEVELOPMENT_TEAM: K7CBQW6MPG
          OTHER_CODE_SIGN_FLAGS: "--timestamp=none"
    info:
      path: VimKeys/Info.plist
      properties:
        CFBundleDisplayName: VimKeys
        CFBundleShortVersionString: "0.4.0"
        CFBundleVersion: "7"
        LSApplicationCategoryType: public.app-category.utilities
        LSUIElement: true
        NSAppleEventsUsageDescription: "VimKeys uses Apple Events to read Safari's open tabs and URL, copy the current page link to the clipboard, and open URLs you type in the vomnibar (o / O / T / yy / p / P)."
        # Sparkle auto-update keys. The matching EdDSA private key is generated
        # by Sparkle's `generate_keys` and stored in the release-builder's macOS
        # keychain. V-M1 ships with an empty SUPublicEDKey and automatic checks
        # disabled; V-M6 generates the real keypair and flips both on.
        SUPublicEDKey: ""
        SUFeedURL: "https://github.com/TaylorFinklea/vimkeys/releases/latest/download/appcast.xml"
        SUEnableAutomaticChecks: false
        SUScheduledCheckInterval: 86400
    scheme:
      gatherCoverageData: false
      testTargets:
        - VimKeysTests
  VimKeysTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: VimKeysTests
    dependencies:
      - target: VimKeys
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    scheme:
      gatherCoverageData: false

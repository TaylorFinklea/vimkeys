name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release:
    runs-on: macos-latest
    permissions:
      contents: write

    env:
      SPARKLE_VERSION: "2.9.1"

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: xcodebuild test -scheme VimKeys -project VimKeys.xcodeproj -destination 'platform=macOS'

      - name: Import Developer ID signing certificate
        env:
          CERT_BASE64: ${{ secrets.APPLE_DEVID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          printf '%s' "$CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm -f "$CERT_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Package release (sign + notarize + staple)
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: ./scripts/package_release.sh

      - id: package
        name: Collect release metadata
        run: |
          set -euo pipefail
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' VimKeys/Info.plist)
          SHA256=$(cat dist/VimKeys.sha256)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Generate Sparkle appcast
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
          REF_NAME: ${{ github.ref_name }}
          REPO_SLUG: ${{ github.repository }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -euo pipefail

          SPARKLE_DIR="$RUNNER_TEMP/sparkle"
          mkdir -p "$SPARKLE_DIR"
          curl -fsSL \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            | tar -xJ -C "$SPARKLE_DIR"
          GENERATE_APPCAST="$SPARKLE_DIR/bin/generate_appcast"

          case "$REF_NAME" in
            v*) TAG="$REF_NAME" ;;
            *)  TAG="v${PACKAGE_VERSION}" ;;
          esac

          KEY_FILE="$RUNNER_TEMP/sparkle-eddsa.key"
          umask 077
          printf '%s' "$SPARKLE_EDDSA_PRIVATE_KEY" > "$KEY_FILE"

          "$GENERATE_APPCAST" \
            --ed-key-file "$KEY_FILE" \
            --download-url-prefix "https://github.com/${REPO_SLUG}/releases/download/${TAG}/" \
            -o dist/appcast.xml \
            dist/

          rm -f "$KEY_FILE"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/VimKeys.zip
            dist/appcast.xml
          generate_release_notes: true
          body: |
            Homebrew cask sha256: `${{ steps.package.outputs.sha256 }}`
